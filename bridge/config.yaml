# CatPaw Bridge Configuration

server:
  host: 127.0.0.1
  port: 4567

catpaw:
  api_host: catpaw.meituan.com
  api_path: /api/gpt/chat/completions
  login_server: https://catpaw.meituan.com  # used for OAuth login
  state_db: "/root/.config/CatPawAI/User/globalStorage/state.vscdb"
  token_ttl: 240  # seconds

models:
  - minimax-m2.7
  - glm-5.2
  - glm-5.1
  - glm-5v-turbo
  - deepseek-v3.2
  - kimi-k2.6
  - kimi-k2.5
  - longcat-2.0
  - longcat-flash

# Context management
context:
  max_total_tokens: 48000
  max_system_prompt: 5000
  max_tool_result: 8000
  max_tool_prompt: 4000
  summarize:
    enabled: false
    min_dropped: 3
    model: longcat-flash
    max_tokens: 500

# Tool filtering
tools:
  # 始终注入的核心工具
  always_include:
    - terminal_exec
    - terminal_background
    - file_read
    - file_write
    - file_list
    - file_search
    - file_edit
    - file_delete
    - file_move
    - grep_search
    - glob_file_search
    - codebase_search
    - web_search
  # 按关键词匹配的工具类别
  keyword_groups:
    browser:
      keywords: [browser, web, page, url, click, navigate, scroll, screenshot]
      tools: [browser_back, browser_click, browser_console, browser_get_images,
              browser_navigate, browser_press, browser_scroll, browser_snapshot,
              browser_type, browser_vision]
    feishu:
      keywords: [feishu, lark, 飞书, document, doc, wiki, sheet, message, chat]
      tools: []  # 动态填充
    mcp:
      keywords: [mcp, awesun, remote, desktop, control]
      tools: []  # 动态填充

# Logging
logging:
  level: DEBUG  # DEBUG | INFO | WARNING | ERROR
  file: /tmp/catpaw-proxy.log
